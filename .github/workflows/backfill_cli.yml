name: Backfill CLI Observations (one-time)

# Manual trigger only — run once, then delete this file
on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Pull latest data
        run: git pull --rebase origin main

      - name: Run CLI backfill
        run: python backfill_cli.py

      - name: Commit backfilled data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/observations_cli.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "cli backfill: Mar 1 - present"
            git push --force-with-lease
          fi
