name: Collect METAR Observations

# Run 4x daily — same schedule as forecast collector so observations
# are captured close to each forecast snapshot.
on:
  schedule:
    - cron: "45 0 * * *"    # 00:45 UTC — 30 min after forecast run
    - cron: "45 6 * * *"    # 06:45 UTC
    - cron: "45 12 * * *"   # 12:45 UTC
    - cron: "45 18 * * *"   # 18:45 UTC
  workflow_dispatch:

# Separate concurrency group from forecast collector so both can
# run in the same window without blocking each other.
concurrency:
  group: metar-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Pull latest data before collecting
        run: git pull --rebase origin main

      - name: Collect METAR observations
        run: python collect_metar.py

      - name: Commit updated METAR data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/observations_metar.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "metar observations: ${TIMESTAMP}"
            git push --force-with-lease
          fi
