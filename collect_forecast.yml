name: Collect NWS Forecast

# Run 4 times per day at 0000, 0600, 1200, 1800 UTC
# These align roughly with NWS forecast update cycles
on:
  schedule:
    - cron: "15 0 * * *"    # 00:15 UTC  (5:15 PM PDT / 6:15 PM PST)
    - cron: "15 6 * * *"    # 06:15 UTC  (11:15 PM PDT / 11:15 PM PST)
    - cron: "15 12 * * *"   # 12:15 UTC  (5:15 AM PDT / 4:15 AM PST)
    - cron: "15 18 * * *"   # 18:15 UTC  (11:15 AM PDT / 10:15 AM PST)
  workflow_dispatch:

# Only one run at a time. cancel-in-progress: false means the second run
# waits in queue rather than being cancelled — no data is ever dropped.
concurrency:
  group: forecast-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      # Pull the very latest CSV from the repo immediately before running
      # the collector. This closes the window where two runs check out the
      # same commit and both see the same last_update value.
      - name: Pull latest data before collecting
        run: git pull --rebase origin main

      - name: Collect NWS forecast
        run: python collect_forecast.py

      - name: Commit updated forecast data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/forecasts.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "forecast snapshot: ${TIMESTAMP}"
            # Use --force-with-lease: fails if another run pushed since our
            # last pull, preventing silent overwrites. The concurrency block
            # above should prevent this from ever being needed, but it's a
            # safety net for any edge cases.
            git push --force-with-lease
          fi
